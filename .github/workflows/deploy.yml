name: Deploy to Server

on:
  push:
    branches:
      - main  # Set this to your default branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files via SSH
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "."
          target: ${{ secrets.SERVER_PATH }}
          rm: false  # Kept false so we don't accidentally delete virtual environments/keys!

      - name: Execute remote commands (Optional)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            echo "Building React Frontend..."
            cd ${{ secrets.SERVER_PATH }}/frontend
            echo "VITE_API_BASE_URL=https://api.conbot.duckdns.org" > .env
            npm install
            npm run build
            
            echo "Updating Django API..."
            cd ${{ secrets.SERVER_PATH }}/backend
            source venv/bin/activate
            pip install -r requirements.txt
            python manage.py collectstatic --noinput
            python manage.py migrate
            
            echo "Restarting NGINX & PM2 Services..."
            pm2 restart evermilk_backend
            sudo systemctl restart nginx
            echo "Deployment finished on server!"
